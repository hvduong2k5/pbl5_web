<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Tomato Detection System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div id="header-container"></div>
    <main class="main-layout">
        <div class="queues-container">
            <div id="queue-detected" class="queue"></div>
            <div id="queue-transfer" class="queue"></div>
            <div id="queue-sorted" class="queue"></div>
        </div>
        <aside class="sidebar">
            <div id="stats-container" class="stats-panel"></div>
            <div id="control-container" class="control-panel">
                <h3>Controls</h3>
                <button id="btn-start" class="btn btn-primary">Start System</button>
                <button id="btn-stop" class="btn btn-danger">Stop System</button>
                <button id="btn-new-batch" class="btn btn-secondary">New Batch</button>
            </div>
        </aside>
    </main>

    <script src="js/utils/constants.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/state/store.js"></script>
    <script src="js/api.js"></script>
    <script src="js/websocket.js"></script>
    <script src="js/components/header.js"></script>
    <script src="js/components/fruitCard.js"></script>
    <script src="js/components/queue.js"></script>
    <script src="js/components/stats.js"></script>
    <script src="js/pages/current.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
